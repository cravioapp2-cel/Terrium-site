<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Your Tank</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
  body { background: #FFFFFF; min-height: 100vh; position: relative; overflow-x: hidden; }
  .blob { position: absolute; z-index: 0; }
  .plant { position: absolute; z-index: 2; }
  .content { position: relative; z-index: 1; text-align: center; padding-top: 80px; max-width: 500px; margin: 0 auto; }
  .content h1 { font-size: 32px; color: #111111; font-weight: 700; margin-bottom: 10px; }
  .content p.subtitle { font-size: 15px; color: #4A2A1F; margin-bottom: 36px; font-weight: 500; }
  #dropZone { border: 2px dashed #111111; border-radius: 16px; background: rgba(255,255,255,0.94); padding: 60px 30px; margin: 0 30px; cursor: pointer; transition: background 0.2s; box-shadow: 0 4px 16px rgba(0,0,0,0.1); position: relative; z-index: 3; }
  #dropZone:hover, #dropZone.dragover { background: rgba(255,255,255,1); }
  #dropZone p.label { font-size: 15px; color: #111111; font-weight: 600; margin-top: 12px; }
  #dropZone p.filetype { font-size: 12px; color: #7A6A60; margin-top: 4px; }
  #fileInput { display: none; }
  #previewImg { max-width: 100%; max-height: 200px; border-radius: 10px; margin-top: 10px; display: none; }
  #continueBtn { margin-top: 30px; background: #111111; color: #FFFFFF; border: none; padding: 14px 36px; border-radius: 999px; font-size: 15px; font-weight: 600; cursor: pointer; position: relative; z-index: 3; }
  #continueBtn:hover { opacity: 0.85; }
</style>
</head>
<body>
  <svg class="blob" style="top:-60px; left:-80px; width:320px; height:320px;" viewBox="0 0 200 200">
    <path d="M0,100 C0,40 60,0 120,20 C180,40 200,100 160,150 C120,200 40,180 20,140 C0,120 0,110 0,100 Z" fill="#FFC700" opacity="0.85"/>
  </svg>
  <svg class="blob" style="top:-50px; right:-100px; width:300px; height:300px;" viewBox="0 0 200 200">
    <path d="M20,20 C80,-10 160,10 180,70 C200,130 150,190 90,180 C30,170 -10,120 10,70 C15,50 15,35 20,20 Z" fill="#FF5C33" opacity="0.85"/>
  </svg>
  <svg class="blob" style="bottom:-90px; left:-60px; width:330px; height:330px;" viewBox="0 0 200 200">
    <path d="M10,120 C-10,60 40,10 100,15 C160,20 200,70 185,130 C170,190 100,210 50,185 C25,172 20,145 10,120 Z" fill="#FF3D8A" opacity="0.8"/>
  </svg>
  <svg class="blob" style="bottom:-70px; right:-70px; width:300px; height:300px;" viewBox="0 0 200 200">
    <path d="M30,30 C90,0 170,30 180,90 C190,150 130,190 80,175 C30,160 0,110 10,70 C15,55 18,42 30,30 Z" fill="#FF8A00" opacity="0.85"/>
  </svg>
  <svg class="plant" style="top:10px; left:20px; width:100px; height:130px;" viewBox="0 0 60 80">
    <path d="M30,80 C30,55 15,50 10,25 C22,35 30,45 30,55 C30,45 38,35 50,25 C45,50 30,55 30,80 Z" fill="#111111"/>
  </svg>
  <svg class="plant" style="top:5px; right:15px; width:90px; height:115px; transform: scaleX(-1);" viewBox="0 0 60 80">
    <path d="M30,80 C30,58 18,50 12,30 C24,38 30,46 30,56 C30,46 36,38 48,30 C42,50 30,58 30,80 Z" fill="#111111"/>
  </svg>
  <svg class="plant" style="bottom:5px; left:0px; width:120px; height:100px;" viewBox="0 0 80 60">
    <ellipse cx="20" cy="55" rx="18" ry="6" fill="#111111"/>
    <path d="M20,55 C10,45 8,30 15,15" stroke="#111111" stroke-width="4" fill="none"/>
    <path d="M20,55 C25,42 35,35 32,18" stroke="#111111" stroke-width="4" fill="none"/>
    <path d="M20,55 C15,40 20,28 10,12" stroke="#111111" stroke-width="4" fill="none"/>
  </svg>
  <svg class="plant" style="bottom:0px; right:0px; width:105px; height:95px; transform: scaleX(-1);" viewBox="0 0 80 60">
    <ellipse cx="20" cy="55" rx="16" ry="5" fill="#111111"/>
    <path d="M20,55 C12,44 10,30 18,16" stroke="#111111" stroke-width="4" fill="none"/>
    <path d="M20,55 C26,40 34,34 30,20" stroke="#111111" stroke-width="4" fill="none"/>
  </svg>
  <div class="content">
    <h1>Upload Your Tank</h1>
    <p class="subtitle">Drag a photo of your empty tank, or click to browse</p>
    <div id="dropZone">
      <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#111111" stroke-width="1.8" style="margin: 0 auto; display:block;">
        <path d="M12 16V4M12 4l-4 4M12 4l4 4" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <p class="label" id="dropLabel">Drop image here</p>
      <p class="filetype">JPG or PNG, up to 10MB</p>
      <img id="previewImg" alt="Preview of your uploaded tank photo">
    </div>
    <input type="file" id="fileInput" accept="image/png, image/jpeg">
    <br>
    <button id="continueBtn">Continue</button>
  </div>
  <script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const previewImg = document.getElementById('previewImg');
    const dropLabel = document.getElementById('dropLabel');
    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => { dropZone.classList.remove('dragover'); });
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file) showPreview(file);
    });
    fileInput.addEventListener('change', () => {
      const file = fileInput.files[0];
      if (file) showPreview(file);
    });
    function showPreview(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        previewImg.src = e.target.result;
        previewImg.style.display = 'block';
        dropLabel.textContent = file.name;
      };
      reader.readAsDataURL(file);
    }
    document.getElementById('continueBtn').addEventListener('click', () => {
      if (!previewImg.src) {
        alert('Please upload a photo of your tank first!');
        return;
      }
      alert('Next: the quiz page will go here!');
    });
  </script>
</body>
</html>
